name: Build

on:
  # Only build when the kernel project (or this workflow) changes — not for docs,
  # README, run.sh, or the reference trees (Medli-Legacy/, Medli-Classic/).
  push:
    branches: [main]
    paths:
      - 'Medli3/**'
      - '.github/workflows/build.yml'
  pull_request:
    paths:
      - 'Medli3/**'
      - '.github/workflows/build.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Install the Cosmos CLI
        run: |
          dotnet tool install -g Cosmos.Tools
          echo "$HOME/.dotnet/tools" >> "$GITHUB_PATH"

      # The Cosmos toolchain (clang/lld/xorriso/qemu/gdb) is bundled under ~/.cosmos;
      # cache it so `cosmos install` doesn't re-download it every run.
      - name: Cache Cosmos toolchain
        uses: actions/cache@v4
        with:
          path: ~/.cosmos
          key: cosmos-${{ runner.os }}-v1

      - name: Install toolchain + verify
        run: |
          cosmos install -y
          cosmos check

      # Builds are a compile/link check only — no ISO artifacts uploaded for now.
      - name: Build (x64)
        run: cosmos build -p Medli3 -a x64

      - name: Build (arm64)
        run: cosmos build -p Medli3 -a arm64
